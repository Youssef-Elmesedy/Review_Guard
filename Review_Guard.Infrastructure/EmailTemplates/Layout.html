<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
        }

        .header {
            background: #0f3460;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 30px;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⭐ VerifiedReviews</h1>
        </div>

        <div class="content">
            {{content}}
        </div>

        <div class="footer">
            © {{year}} VerifiedReviews
        </div>
    </div>
</body>
</html>
